<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN">
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lab 16</title>
    <meta http-equiv="Content-Type" content="text/html; charset=us-ascii" />
    <style>
      .flex-container {
        display: flex;
      }
      svg#choropleth-map {
        border: 1px solid black;
      }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>
  <body>
    <h1>Lab 16: Choropleth Map</h1>
    <div class="flex-container">
      <svg id="choropleth-map"></svg>
      <svg id="bar-graph"></svg>
    </div>
    <script>
      const fetchData = async () => {
        try {
          const geoData = await d3.json(
            "https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson"
          );
          const data = await d3.csv("2019.csv");
          console.log(data);
          drawChoroplethmap(geoData, data);
          drawBargraph();
        } catch (error) {
          console.error("Error fetching data:", error);
        }
      };

      function drawChoroplethmap(geoData, data) {
        const width = 700;
        const height = 500;

        //Add your code here

        const svg = d3.select("#choropleth-map")
          .attr("width", width)
          .attr("height", height);

        const projection = d3.geoNaturalEarth1()
          .fitSize([width, height], geoData);

        const path = d3.geoPath().projection(projection);

        const scoreMap = {};
        data.forEach(d => {
          scoreMap[d.Country] = +d.Score;
        });

        const color = d3.scaleSequential()
          .domain(d3.extent(data, d => +d.Score))
          .interpolator(d3.interpolateBlues);

        const tooltip = d3.select("body")
          .append("div")
          .style("position","absolute")
          .style("background","white")
          .style("padding","6px")
          .style("border","1px solid black")
          .style("visibility","hidden");

        svg.selectAll("path")
          .data(geoData.features)
          .enter()
          .append("path")
          .attr("d", path)
          .attr("fill", d => {
            const score = scoreMap[d.properties.name];
            return score ? color(score) : "#ccc";
          })
          .attr("stroke", "black")
          .on("mouseover", (event,d) => {

            const countryData = data.find(c => c.Country === d.properties.name);

            tooltip
              .style("visibility","visible")
              .html(`<b>${d.properties.name}</b><br>
              Score: ${countryData ? countryData.Score : "No data"}`);

            if(countryData){
              drawBargraph(countryData);
            }

          })
          .on("mousemove", event => {
            tooltip
              .style("top", event.pageY + 10 + "px")
              .style("left", event.pageX + 10 + "px");
          })
          .on("mouseout", () => {
            tooltip.style("visibility","hidden");
          });

        // legend
        const legend = svg.append("g")
          .attr("transform","translate(20,450)");

        const legendScale = d3.scaleLinear()
          .domain(color.domain())
          .range([0,200]);

        const legendAxis = d3.axisBottom(legendScale).ticks(5);

        const gradient = svg.append("defs")
          .append("linearGradient")
          .attr("id","gradient");

        gradient.selectAll("stop")
          .data(d3.range(0,1.01,0.1))
          .enter()
          .append("stop")
          .attr("offset", d=> d*100 + "%")
          .attr("stop-color", d=> color(
            color.domain()[0] + d*(color.domain()[1]-color.domain()[0])
          ));

        legend.append("rect")
          .attr("width",200)
          .attr("height",10)
          .style("fill","url(#gradient)");

        legend.append("g")
          .attr("transform","translate(0,10)")
          .call(legendAxis);
      }

      function drawBargraph(data = null) {
        const width = 300;
        const height = 300;
        const margin = { top: 20, right: 30, bottom: 100, left: 100 };

        const svg = d3.select("#bar-graph")
          .attr("width", width)
          .attr("height", height);

        if (!data) {
          svg
            .append("text")
            .attr("x", width / 2)
            .attr("y", height / 2)
            .attr("text-anchor", "middle")
            .text("Hover over a country to see the data");
          return;
        }

        const factors = [];

        for (const factor in data) {
          if (
            factor === "Country" ||
            factor === "Score" ||
            factor === "Overall rank"
          ) {
            continue;
          }
          factors.push({
            Factor: factor,
            Score: +data[factor],
          });
        }

        //Add your code here

        svg.selectAll("*").remove();

        const chartWidth = width - margin.left - margin.right;
        const chartHeight = height - margin.top - margin.bottom;

        const g = svg.append("g")
          .attr("transform",`translate(${margin.left},${margin.top})`);

        const x = d3.scaleBand()
          .domain(factors.map(d => d.Factor))
          .range([0, chartWidth])
          .padding(0.2);

        const y = d3.scaleLinear()
          .domain([0, d3.max(factors,d=>d.Score)])
          .range([chartHeight,0]);

        g.append("g")
          .attr("transform",`translate(0,${chartHeight})`)
          .call(d3.axisBottom(x))
          .selectAll("text")
          .attr("transform","rotate(-45)")
          .style("text-anchor","end");

        g.append("g")
          .call(d3.axisLeft(y));

        g.selectAll("rect")
          .data(factors)
          .enter()
          .append("rect")
          .attr("x",d=>x(d.Factor))
          .attr("y",d=>y(d.Score))
          .attr("width",x.bandwidth())
          .attr("height",d=>chartHeight - y(d.Score))
          .attr("fill","steelblue");
      }

      fetchData();
    </script>
  </body>
</html>
